name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Run ShellCheck on library files
        run: shellcheck -s bash lib/*.sh
      - name: Run ShellCheck on demo scripts
        run: shellcheck -s bash demo.sh || true

  test:
    name: Bats Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: |
          git clone https://github.com/bats-core/bats-core.git
          cd bats-core && sudo ./install.sh /usr/local
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run tests
        run: bats --recursive tests/
